{% extends "base.html" %}
<!-- {% load static %} -->
{% block content %}

<div class="users-container">

    <h2 class="page-title">Private Chats</h2>

    <div class="users-list">
        {% for user in users %}
            <div class="user-card">
                <div class="user-name">
                    {{ user.username }}
                </div>

                <a href="{% url 'private_chat' user.id %}" class="btn-message">
                    Message
                </a>
            </div>
        {% empty %}
            <p>No users available.</p>
        {% endfor %}
    </div>

</div>

{% endblock %}
